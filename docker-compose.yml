services:

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor

    ports:
      - "8081:8080"

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro

  prometheus:
    image: prom/prometheus
    container_name: prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: grafana

    ports:
      - "3000:3000"

    depends_on:
      - prometheus

  sentinelai:
    build: ./SentiAI
    container_name: sentinel_ai_container

    ports:
      - "8001:8000"

    volumes:
      - ./SentiAI/data:/sentinel-ai/data
      - ./SentiAI/logs:/sentinel-ai/logs
      - ./SentiAI/videos:/sentinel-ai/videos

    environment:
      - VIDEO_SOURCE=mock
      - CONFIDENCE_THRESHOLD=0.45
      - DATABASE_URL=sqlite:///data/sentinel.db
      - LOG_LEVEL=INFO

    restart: unless-stopped